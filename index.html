<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cómo te va a recordar la máquina</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght=0,400;0,700;1,400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #000; --fg: #F0F0F0; --dim: #555; --accent: #C0392B;
      --border: #1a1a1a; --mono: 'Space Mono', monospace;
    }
    html, body { background: var(--bg); color: var(--fg); font-family: var(--mono); font-size: 13px; min-height: 100vh; line-height: 1.6; }

    header { border-bottom: 1px solid var(--border); padding: 18px 32px; display: flex; justify-content: space-between; align-items: baseline; flex-wrap: wrap; gap: 8px; }
    header h1 { font-size: 12px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; }
    
    main { padding: 32px; max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: 1fr 1fr; gap: 32px; }
    @media (max-width: 768px) { main { grid-template-columns: 1fr; } }

    .view-panel { display: flex; flex-direction: column; align-items: center; }
    .image-wrap { position: relative; width: 100%; max-width: 500px; aspect-ratio: 4/3; background: #050505; border: 1px solid var(--border); overflow: hidden; display: flex; align-items: center; justify-content: center; }
    .image-wrap img { max-width: 100%; max-height: 100%; object-fit: contain; width: 100%; height: 100%; }
    
    .overlay { position: absolute; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.92); display: none; align-items: center; justify-content: center; z-index: 10; font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--accent); text-align: center; padding: 20px; font-weight: bold; }
    .overlay.active { display: flex; }

    .control-panel { display: flex; flex-direction: column; gap: 20px; justify-content: center; }
    
    .counters-box { display: flex; justify-content: space-between; border: 1px solid var(--border); padding: 12px 16px; background: #030303; font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; }
    .count-item { display: flex; gap: 8px; }
    .count-label { color: var(--dim); }
    .count-val { font-weight: bold; color: var(--fg); }
    .count-val.ia { color: var(--accent); }

    .actions { display: flex; gap: 16px; }
    button { flex: 1; background: transparent; border: 1px solid var(--fg); color: var(--fg); padding: 14px; font-family: var(--mono); cursor: pointer; text-transform: uppercase; letter-spacing: 0.05em; font-size: 11px; transition: all 0.2s ease; }
    button:hover { background: var(--fg); color: var(--bg); }
    button.btn-accent { border-color: var(--accent); color: var(--accent); }
    button.btn-accent:hover { background: var(--accent); color: var(--fg); }

    .history-section { grid-column: 1 / -1; margin-top: 16px; border-top: 1px solid var(--border); padding-top: 32px; }
    .history-section h2 { font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 16px; color: var(--dim); }
    .history-grid { display: flex; flex-wrap: wrap; gap: 12px; }
    .history-thumb { width: 60px; height: 60px; border: 1px solid var(--border); background: #050505; position: relative; cursor: help; overflow: hidden; }
    .history-thumb img { width: 100%; height: 100%; object-fit: cover; opacity: 0.5; }
    .history-thumb.is-ia img { opacity: 0.8; }
    .history-thumb .thumb-num { position: absolute; bottom: 2px; right: 4px; font-size: 8px; color: var(--dim); }

    @keyframes glitchAnim {
      0% { transform: translate(0); }
      20% { transform: translate(-2px, 2px); }
      40% { transform: translate(-2px, -2px); }
      60% { transform: translate(2px, 2px); }
      80% { transform: translate(2px, -2px); }
      100% { transform: translate(0); }
    }
    .glitching img { animation: glitchAnim 0.2s linear 2; }
  </style>
</head>
<body>

  <header>
    <h1>Cómo te va a recordar la máquina</h1>
    <div>NET ART // </div>
  </header>

  <main>
    <section class="view-panel">
      <div class="image-wrap" id="imgWrap">
        <div class="overlay" id="overlay">Generando nueva interpretación...</div>
        <img id="mainImg" alt="Retrato en transformación" />
      </div>
    </section>

    <section class="control-panel">
      <div class="counters-box">
        <div class="count-item">
          <span class="count-label">Humano:</span>
          <span class="count-val" id="cHuman">0</span>
        </div>
        <div class="count-item">
          <span class="count-label">Algoritmo (IA):</span>
          <span class="count-val ia" id="cIA">0</span>
        </div>
      </div>

      <div class="actions">
        <button id="btnKeep">Dejar como está</button>
        <button id="btnIA" class="btn-accent">Dejar que la IA la interprete</button>
      </div>
    </section>

    <section class="history-section">
      <h2>Registro de mutaciones y estados anteriores</h2>
      <div class="history-grid" id="historyGrid"></div>
    </section>
  </main>

  <script>
    const ARCHIVO_FOTO = "JM.png"; 
    
    // Lista automática del 1 al 29 fotos
    const MIS_IMAGENES_IA = Array.from({length: 29}, (_, i) => `${i + 1}.png`);

    const textosDeProcesamiento = [
      "Procesando registros visuales...",
      "Ejecutando deconstrucción de la imagen...",
      "Asignando variables estéticas..."
    ];

    const state = { version: 0, countHuman: 0, countIA: 0, iaIndex: 0, history: [], currentSrc: ARCHIVO_FOTO };
    const $ = id => document.getElementById(id);

    window.addEventListener('DOMContentLoaded', () => {
      $('mainImg').src = state.currentSrc;
      state.history.push({ src: ARCHIVO_FOTO, isIA: false, version: 0, text: "Estado v0: Imagen original cargada." });
      actualizarInterfaz();
      
      $('btnKeep').addEventListener('click', manejarDecisionHumana);
      $('btnIA').addEventListener('click', manejarIntervencionIA);
      
      window.addEventListener('keydown', (e) => {
        if (e.key === 'r' || e.key === 'R') {
          reiniciarObra();
        }
      });
    });

    function actualizarInterfaz() {
      $('cHuman').textContent = state.countHuman;
      $('cIA').textContent = state.countIA;
      renderizarHistorial();
    }

    function glitch() {
      const wrap = $('imgWrap');
      wrap.classList.add('glitching');
      setTimeout(() => { wrap.classList.remove('glitching'); }, 500);
    }

    function setLoading(loading, texto = "") {
      $('overlay').textContent = texto;
      if (loading) $('overlay').classList.add('active');
      else $('overlay').classList.remove('active');
    }

    function reiniciarObra() {
      state.version = 0;
      state.countHuman = 0;
      state.countIA = 0;
      state.iaIndex = 0;
      state.currentSrc = ARCHIVO_FOTO;
      $('mainImg').src = state.currentSrc;
      state.history = [{ src: ARCHIVO_FOTO, isIA: false, version: 0, text: "Estado v0: Imagen original cargada." }];
      actualizarInterfaz();
    }

    function manejarDecisionHumana() {
      state.version++;
      state.countHuman++;
      glitch();
      state.history.push({ src: state.currentSrc, isIA: false, version: state.version, text: `Decisión humana v${state.version}: Conservó apariencia.` });
      if (state.history.length > 16) state.history.shift();
      actualizarInterfaz();
    }

    function manejarIntervencionIA() {
      if (state.iaIndex >= MIS_IMAGENES_IA.length) {
        state.iaIndex = 0;
      }

      const fraseDeCarga = textosDeProcesamiento[Math.floor(Math.random() * textosDeProcesamiento.length)];
      
      setLoading(true, "Iniciando proceso...");

      setTimeout(() => {
        setLoading(true, fraseDeCarga);
        
        setTimeout(() => {
          const fotoElegida = MIS_IMAGENES_IA[state.iaIndex];
          state.iaIndex++;

          state.version++;
          state.countIA++;
          state.currentSrc = fotoElegida;
          $('mainImg').src = state.currentSrc;

          state.history.push({
            src: state.currentSrc,
            isIA: true,
            version: state.version,
            text: `Mutación IA v${state.version}`
          });

          if (state.history.length > 16) state.history.shift();
          glitch();
          setLoading(false);
          
          actualizarInterfaz();
        }, 1200);
      }, 800);
    }

    function renderizarHistorial() {
      const grid = $('historyGrid');
      grid.innerHTML = '';
      state.history.forEach(item => {
        const thumb = document.createElement('div');
        thumb.className = `history-thumb ${item.isIA ? 'is-ia' : ''}`;
        thumb.title = item.text;
        
        const img = document.createElement('img');
        img.src = item.src;
        
        const num = document.createElement('span');
        num.className = 'thumb-num';
        num.textContent = `v${item.version}`;
        
        thumb.appendChild(img);
        thumb.appendChild(num);
        grid.appendChild(thumb);
      });
    }
  </script>
</body>
</html>
